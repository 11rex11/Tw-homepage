<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Triston Ward</title>

<style>
:root{
    --bg:#07090d;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.08);

    --text:#f5f7fa;
    --muted:#b9c0cb;

    --accent:#b88453;
    --accent-soft:rgba(184,132,83,.25);

    --shadow:0 20px 60px rgba(0,0,0,.45);

    --transition:cubic-bezier(.22,.61,.36,1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ===== BACKGROUND ===== */

#bgCanvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* Ambient glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, rgba(184,132,83,.12), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(184,132,83,.08), transparent 30%),
    radial-gradient(circle at center, rgba(255,255,255,.02), transparent 60%);
    pointer-events:none;
    z-index:1;
}

/* ===== HERO ===== */

.hero{
    position:relative;
    z-index:2;

    width:100%;
    height:100dvh;

    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
}

.glass-panel{
    position:relative;

    min-width:min(92vw,900px);
    text-align:center;

    padding:70px 50px;
    border-radius:32px;

    background:var(--glass);
    border:1px solid var(--glass-border);

    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);

    box-shadow:var(--shadow);

    /* Smooth fallback transition for when mouse leaves */
    transition: transform .5s var(--transition),
                border-color .5s ease,
                box-shadow .5s ease;
}

.glass-panel:hover{
    border-color:rgba(184,132,83,.18);

    box-shadow:
    0 30px 80px rgba(0,0,0,.5),
    0 0 40px rgba(184,132,83,.08);
}

.name{
    font-size:clamp(2.8rem,8vw,6.5rem);
    font-weight:700;
    letter-spacing:.08em;

    text-shadow:
    0 0 18px rgba(255,255,255,.08);

    margin-bottom:24px;
}

/* ===== MECHANICAL FLIP CLOCK SYSTEM ===== */

.role-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 64px;
    perspective: 400px; /* Crucial for structural 3D leaf depth */
}

.flip-clock {
    display: inline-flex;
    flex-direction: column;
    position: relative;
    height: 48px;
    background: #0d1117;
    border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.04);
    overflow: visible;
}

/* Base configuration for split panels */
.flip-card-half {
    font-size: clamp(0.85rem, 1.8vw, 1.15rem);
    font-weight: 600;
    letter-spacing: .24em;
    text-transform: uppercase;
    color: var(--accent);
    
    padding: 0 28px;
    height: 24px;
    overflow: hidden;
    position: relative;
    background: #0d1117;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
}

/* Align text properties for top segments */
.flip-card-top {
    border-top-left-radius: 6px;
    border-top-right-radius: 6px;
    line-height: 48px; /* Double standard line height offsets positioning */
    border-bottom: 1px solid rgba(0, 0, 0, 0.45); /* Physical split boundary line */
}

/* Align text properties for bottom segments */
.flip-card-bottom {
    border-bottom-left-radius: 6px;
    border-bottom-right-radius: 6px;
    line-height: 0px; /* Collapsed sizing forces standard textual alignment up */
}

/* GPU Accelerated animation properties */
.flip-animate {
    position: absolute;
    left: 0;
    width: 100%;
    transform-origin: bottom;
    z-index: 3;
}

.flip-animate.top {
    top: 0;
    animation: flipTop 0.45s cubic-bezier(.4, 0, .2, 1) forwards;
}

@keyframes flipTop {
    0% { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
}

/* Accent line */
.accent-line{
    width:140px;
    height:1px;
    margin:32px auto 0;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(184,132,83,.8),
        transparent
    );

    position:relative;
    overflow:hidden;
}

.accent-line::after{
    content:"";
    position:absolute;
    top:0;
    left:-30%;
    width:30%;
    height:100%;

    background:rgba(255,255,255,.8);
    filter:blur(3px);

    animation:sweep 5s infinite linear;
}

@keyframes sweep{
    to{
        left:130%;
    }
}

/* Responsive adjustments */
@media (max-width:700px){

    .glass-panel{
        padding:50px 28px;
        border-radius:16px;
    }
    
    .flip-card-half {
        padding: 0 16px;
    }
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<section class="hero">
    <div class="glass-panel" id="panel">

        <h1 class="name">Triston Ward</h1>

        <div class="role-wrapper">
            <div id="flipClock" class="flip-clock">
                <div class="flip-card-half flip-card-top">Operations Management</div>
                <div class="flip-card-half flip-card-bottom">Operations Management</div>
            </div>
        </div>

        <div class="accent-line"></div>

    </div>
</section>

<script>
/* ==================================
   EASY TO EDIT SECTION
================================== */

const roles = [
"Operations Management",
"Strategic Operations",
"Systems Orchestration",
"Operational Architecture",
"Organizational Engineering",
"Technical Operations",
"Systems Integration",
"Process Optimization",
"Production Logistics",
"Operational Intelligence",
"Strategic Execution",
"Systems Leadership",
"Workflow Engineering",
"Complexity Management",
"Operational Strategy",
"Executive Operations",
"Systems Design",
"Infrastructure Strategy",
"Execution Management",
"Structural Optimization"
];

const roleInterval = 3000;

/* ==================================
   MECHANICAL SPLIT-FLAP CLOCK ENGINE
================================== */
const clockContainer = document.getElementById("flipClock");
let roleIndex = 0;

function flipToNextRole() {
    const nextIndex = (roleIndex + 1) % roles.length;
    const currentText = roles[roleIndex];
    const nextText = roles[nextIndex];

    // Reconstruct domestic component arrays on edge trigger cycles
    clockContainer.innerHTML = `
        <div class="flip-card-half flip-card-top">${nextText}</div>
        <div class="flip-card-half flip-card-bottom">${nextText}</div>
        
        <div class="flip-card-half flip-card-bottom" style="position:absolute; bottom:0; z-index:1;">${currentText}</div>
        
        <div class="flip-card-half flip-card-top flip-animate top">${currentText}</div>
    `;

    roleIndex = nextIndex;
}

// Fire continuous loop intervals
setInterval(flipToNextRole, roleInterval);

/* ==================================
   CANVAS SYSTEM VISUALIZATION
================================== */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

let w, h;
let particles = [];
let gears = [];

function initSystems(){
    particles = [];
    gears = [];
    
    for(let i=0;i<95;i++){
        particles.push(new Particle());
    }

    for(let i=0;i<8;i++){
        gears.push(
            new Gear(
                Math.random()*w,
                Math.random()*h,
                60 + Math.random()*90,
                14 + Math.floor(Math.random()*10),
                (Math.random()-.5)*0.002
            )
        );
    }
}

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    initSystems(); 
}

/* PARTICLES */

class Particle{
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random() * w;
        this.y = Math.random() * h;

        this.vx = (Math.random() - 0.5) * .35;
        this.vy = (Math.random() - 0.5) * .35;

        this.size = Math.random() * 2.2 + .6;
        this.alpha = Math.random() * .45;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;

        if(this.x < -50 || this.x > w+50 ||
           this.y < -50 || this.y > h+50){
            this.reset();
        }
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle =
            `rgba(184,132,83,${this.alpha})`;

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

/* GEAR SYSTEMS */

class Gear{
    constructor(x,y,r,teeth,speed){
        this.x=x;
        this.y=y;
        this.r=r;
        this.teeth=teeth;
        this.speed=speed;
        this.angle=Math.random()*Math.PI*2;
    }

    update(){
        this.angle += this.speed;
    }

    draw(){
        ctx.save();
        ctx.translate(this.x,this.y);
        ctx.rotate(this.angle);

        ctx.strokeStyle = "rgba(255,255,255,.035)";
        ctx.lineWidth = 1;

        for(let i=0;i<this.teeth;i++){
            const a = (Math.PI*2/this.teeth)*i;
            const x1 = Math.cos(a)*(this.r);
            const y1 = Math.sin(a)*(this.r);
            const x2 = Math.cos(a)*(this.r+8);
            const y2 = Math.sin(a)*(this.r+8);

            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(0,0,this.r,0,Math.PI*2);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0,0,this.r*.25,0,Math.PI*2);
        ctx.stroke();

        ctx.restore();
    }
}

// Initialize viewport allocations
resize();
window.addEventListener("resize", resize);

/* ANIMATION RENDERING HARNESS */

function connectParticles(){
    for(let a=0;a<particles.length;a++){
        for(let b=a;b<particles.length;b++){
            const dx = particles[a].x - particles[b].x;
            const dy = particles[a].y - particles[b].y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if(dist < 140){
                ctx.beginPath();
                ctx.strokeStyle = `rgba(184,132,83,${0.06 - dist/2400})`;
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.stroke();
            }
        }
    }
}

function animate(){
    ctx.clearRect(0,0,w,h);

    gears.forEach(g=>{
        g.update();
        g.draw();
    });

    particles.forEach(p=>{
        p.update();
        p.draw();
    });

    connectParticles();
    requestAnimationFrame(animate);
}
animate();

/* PARALLAX (RECONCILED MATRIX EFFECT) */

const panel = document.getElementById("panel");
let isHovered = false;

panel.addEventListener("mouseenter", () => isHovered = true);
panel.addEventListener("mouseleave", () => {
    isHovered = false;
    panel.style.transform = `translate(0px, 0px)`;
});

document.addEventListener("mousemove", e => {
    if (window.innerWidth > 700) {
        const x = (e.clientX / w - .5) * 8;
        const y = (e.clientY / h - .5) * 8;
        const lift = isHovered ? -4 : 0;
        panel.style.transform = `translate(${x}px, ${y + lift}px)`;
    }
});
</script>

</body>
</html>
