<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Triston Ward</title>

<style>
:root{
    --bg:#07090d;
    --glass:rgba(255,255,255,0.06);
    --glass-border:rgba(255,255,255,0.08);

    --text:#f5f7fa;
    --muted:#b9c0cb;

    --accent:#b88453;
    --accent-soft:rgba(184,132,83,.25);

    --shadow:0 20px 60px rgba(0,0,0,.45);

    --transition:cubic-bezier(.22,.61,.36,1);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--text);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ===== BACKGROUND ===== */

#bgCanvas{
    position:fixed;
    inset:0;
    z-index:0;
}

/* Ambient glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 30%, rgba(184,132,83,.12), transparent 35%),
    radial-gradient(circle at 80% 70%, rgba(184,132,83,.08), transparent 30%),
    radial-gradient(circle at center, rgba(255,255,255,.02), transparent 60%);
    pointer-events:none;
    z-index:1;
}

/* ===== HERO ===== */

.hero{
    position:relative;
    z-index:2;

    width:100%;
    height:100dvh;

    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
}

.glass-panel{
    position:relative;

    min-width:min(92vw,900px);
    text-align:center;

    padding:70px 50px;
    border-radius:32px;

    background:var(--glass);
    border:1px solid var(--glass-border);

    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);

    box-shadow:var(--shadow);

    transition:transform .5s var(--transition),
               border-color .5s ease,
               box-shadow .5s ease;
}

.glass-panel:hover{
    transform:translateY(-4px);
    border-color:rgba(184,132,83,.18);

    box-shadow:
    0 30px 80px rgba(0,0,0,.5),
    0 0 40px rgba(184,132,83,.08);
}

.name{
    font-size:clamp(2.8rem,8vw,6.5rem);
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;

    text-shadow:
    0 0 18px rgba(255,255,255,.08);

    margin-bottom:24px;
}

.role-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;

    height:52px;
    overflow:hidden;
}

.role{
    position:relative;
    font-size:clamp(1rem,2vw,1.35rem);
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--muted);

    min-width:340px;
}

/* Flip animation */
.flip{
    display:inline-block;
    animation:flipIn .8s var(--transition);
}

@keyframes flipIn{
    0%{
        transform:
            perspective(800px)
            rotateX(-90deg)
            translateY(-12px);
        opacity:0;
    }

    100%{
        transform:
            perspective(800px)
            rotateX(0deg)
            translateY(0);
        opacity:1;
    }
}

/* Accent line */
.accent-line{
    width:140px;
    height:1px;
    margin:32px auto 0;

    background:
    linear-gradient(
        90deg,
        transparent,
        rgba(184,132,83,.8),
        transparent
    );

    position:relative;
    overflow:hidden;
}

.accent-line::after{
    content:"";
    position:absolute;
    top:0;
    left:-30%;
    width:30%;
    height:100%;

    background:rgba(255,255,255,.8);
    filter:blur(3px);

    animation:sweep 5s infinite linear;
}

@keyframes sweep{
    to{
        left:130%;
    }
}

/* Responsive */
@media (max-width:700px){

    .glass-panel{
        padding:50px 28px;
        border-radius:26px;
    }

    .role{
        min-width:unset;
        letter-spacing:.12em;
    }
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<section class="hero">
    <div class="glass-panel">

        <h1 class="name">Triston Ward</h1>

        <div class="role-wrapper">
            <div id="roleText" class="role">
                <span class="flip">Operations Management</span>
            </div>
        </div>

        <div class="accent-line"></div>

    </div>
</section>

<script>
/* ==================================
   EASY TO EDIT SECTION
================================== */

const roles = [
"Operations Management",
"Strategic Operations",
"Systems Orchestration",
"Organizational Engineering",
"Executive Operations",
"Process Architecture",
"Technical Operations",
"Production Logistics",
"Systems Integration",
"Operational Strategy"
];

const roleInterval = 3000;

/* ==================================
   FLIP ROLE TEXT
================================== */

const roleEl = document.getElementById("roleText");
let roleIndex = 0;

setInterval(() => {
    roleIndex = (roleIndex + 1) % roles.length;

    roleEl.innerHTML =
    `<span class="flip">${roles[roleIndex]}</span>`;
}, roleInterval);

/* ==================================
   CANVAS SYSTEM VISUALIZATION
================================== */

const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");

let w, h;
let particles = [];
let gears = [];

function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* PARTICLES */

class Particle{
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random() * w;
        this.y = Math.random() * h;

        this.vx = (Math.random() - 0.5) * .35;
        this.vy = (Math.random() - 0.5) * .35;

        this.size = Math.random() * 2.2 + .6;
        this.alpha = Math.random() * .45;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;

        if(this.x < -50 || this.x > w+50 ||
           this.y < -50 || this.y > h+50){
            this.reset();
        }
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle =
            `rgba(184,132,83,${this.alpha})`;

        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

/* GEAR-LIKE SYSTEM NODES */

class Gear{
    constructor(x,y,r,teeth,speed){
        this.x=x;
        this.y=y;
        this.r=r;
        this.teeth=teeth;
        this.speed=speed;
        this.angle=Math.random()*Math.PI*2;
    }

    update(){
        this.angle += this.speed;
    }

    draw(){

        ctx.save();
        ctx.translate(this.x,this.y);
        ctx.rotate(this.angle);

        ctx.strokeStyle =
            "rgba(255,255,255,.035)";
        ctx.lineWidth = 1;

        for(let i=0;i<this.teeth;i++){
            const a =
                (Math.PI*2/this.teeth)*i;

            const x1 =
                Math.cos(a)*(this.r);

            const y1 =
                Math.sin(a)*(this.r);

            const x2 =
                Math.cos(a)*(this.r+8);

            const y2 =
                Math.sin(a)*(this.r+8);

            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(0,0,this.r,0,Math.PI*2);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0,0,this.r*.25,0,Math.PI*2);
        ctx.stroke();

        ctx.restore();
    }
}

/* INIT */

for(let i=0;i<95;i++){
    particles.push(new Particle());
}

for(let i=0;i<8;i++){
    gears.push(
        new Gear(
            Math.random()*w,
            Math.random()*h,
            60 + Math.random()*90,
            14 + Math.floor(Math.random()*10),
            (Math.random()-.5)*0.002
        )
    );
}

/* ANIMATION */

function connectParticles(){

    for(let a=0;a<particles.length;a++){

        for(let b=a;b<particles.length;b++){

            const dx =
                particles[a].x -
                particles[b].x;

            const dy =
                particles[a].y -
                particles[b].y;

            const dist =
                Math.sqrt(dx*dx + dy*dy);

            if(dist < 140){

                ctx.beginPath();

                ctx.strokeStyle =
                `rgba(184,132,83,
                ${0.06 - dist/2400})`;

                ctx.moveTo(
                    particles[a].x,
                    particles[a].y
                );

                ctx.lineTo(
                    particles[b].x,
                    particles[b].y
                );

                ctx.stroke();
            }
        }
    }
}

function animate(){

    ctx.clearRect(0,0,w,h);

    gears.forEach(g=>{
        g.update();
        g.draw();
    });

    particles.forEach(p=>{
        p.update();
        p.draw();
    });

    connectParticles();

    requestAnimationFrame(animate);
}

animate();

/* SUBTLE PARALLAX */

document.addEventListener("mousemove", e => {

    const x =
    (e.clientX / w - .5) * 8;

    const y =
    (e.clientY / h - .5) * 8;

    document.querySelector(".glass-panel")
        .style.transform =
        `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
